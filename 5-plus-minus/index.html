<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width">
	<title>Math Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto" rel="stylesheet">
	<link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="shortcut icon" href="logo.ico"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</head>
<body>

	<div id="questionContainer" class="hide">
		  <p>question <span id="questionNumber"></span></p>
      <h2 id="equation" class="equation"></h2>
      <form id="answerForm" action="" autocomplete="off" >
        <input class="form‐control" id="answerBox" type="number" placeholder="Type your answer here..." required autofocus>
        <button class="btn btn-primary">Submit</button>
      </form>
	  <button class="btn btn-secondary" id="negationBtn" type="button">minus -</button>
  </div>
  <div id="endgameContainer" class="hide">
    <a href="..">Change mode</a>
    <p id="score"></p>
    <p>time: <span id="time"></span></p>
    <button id="restartBtn" class="btn btn-primary">restart</button>
    <button id="viewAnalysis" class="btn btn‐primary">view analysis</button>
    <br>
  </div>
  <div id="analysisContainer" class="hide">
    <button id="toEndgameContainer" class="btn btn-primary">Back</button>
    <h3>Analysis</h3>
    <div id="analysis">
    </div>
  </div>
  <div id="startgameContainer">
    <a href="..">Change mode</a>
    <h1>Quick Maths</h1>
    <p>solve 5 math questions as fast as you can!</p>
    <button id="startBtn" class="btn btn-primary">start</button>
  </div>
  <script src="script.js"></script>
  </body>
</html>
